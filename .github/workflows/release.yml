name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  OPENOCD_VERSION: "0.12.0-7"

jobs:
  build-linux:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libudev-dev libhidapi-dev libgl1-mesa-dev \
            libxrandr-dev libxcb-render0-dev libxi-dev libxcursor-dev \
            libxinerama-dev libx11-dev libatk1.0-dev libgtk-3-dev \
            libusb-1.0-0-dev libxdo-dev libfuse2

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Package
        run: cargo packager --release --formats deb,appimage

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: target/release/*.deb

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: target/release/*.AppImage

      - name: Download OpenOCD
        run: |
          curl -sL "https://github.com/xpack-dev-tools/openocd-xpack/releases/download/v${OPENOCD_VERSION}/xpack-openocd-${OPENOCD_VERSION}-linux-x64.tar.gz" | tar xz
          mv "xpack-openocd-${OPENOCD_VERSION}" openocd-bundle

      - name: Create portable archive with OpenOCD
        run: |
          mkdir -p datavis-rs-linux-x86_64/openocd/bin
          cp target/x86_64-unknown-linux-gnu/release/datavis-rs datavis-rs-linux-x86_64/
          cp openocd-bundle/bin/openocd datavis-rs-linux-x86_64/openocd/bin/
          cp -r openocd-bundle/openocd/scripts datavis-rs-linux-x86_64/openocd/scripts
          cp -r openocd-bundle/libexec datavis-rs-linux-x86_64/openocd/libexec
          chmod +x datavis-rs-linux-x86_64/datavis-rs datavis-rs-linux-x86_64/openocd/bin/openocd
          tar czf datavis-rs-linux-x86_64.tar.gz datavis-rs-linux-x86_64

      - name: Upload portable archive
        uses: actions/upload-artifact@v4
        with:
          name: linux-portable
          path: datavis-rs-linux-x86_64.tar.gz

  build-macos-aarch64:
    name: Build (macOS aarch64)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Download OpenOCD
        run: |
          curl -sL "https://github.com/xpack-dev-tools/openocd-xpack/releases/download/v${OPENOCD_VERSION}/xpack-openocd-${OPENOCD_VERSION}-darwin-arm64.tar.gz" | tar xz
          mv "xpack-openocd-${OPENOCD_VERSION}" openocd-bundle

      - name: Package
        run: cargo packager --release --formats dmg --target aarch64-apple-darwin

      - name: Bundle OpenOCD into DMG
        run: |
          # Find the .app — cargo-packager outputs to target/<triple>/release/bundle/macos/
          APP_PATH=$(find target -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find .app bundle"
            exit 1
          fi
          # Inject OpenOCD into the .app bundle
          mkdir -p "$APP_PATH/Contents/Resources/openocd/bin"
          cp openocd-bundle/bin/openocd "$APP_PATH/Contents/Resources/openocd/bin/"
          cp -r openocd-bundle/openocd/scripts "$APP_PATH/Contents/Resources/openocd/scripts"
          cp -r openocd-bundle/libexec "$APP_PATH/Contents/Resources/openocd/libexec"
          chmod +x "$APP_PATH/Contents/Resources/openocd/bin/openocd"
          # Re-create DMG with bundled OpenOCD
          hdiutil create -volname "Data Visualizer" -srcfolder "$APP_PATH" -ov -format UDZO "Data Visualizer_aarch64.dmg"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64-dmg
          path: "Data Visualizer_aarch64.dmg"

      - name: Create portable archive with OpenOCD
        run: |
          mkdir -p datavis-rs-macos-aarch64/openocd/bin
          cp target/aarch64-apple-darwin/release/datavis-rs datavis-rs-macos-aarch64/
          cp openocd-bundle/bin/openocd datavis-rs-macos-aarch64/openocd/bin/
          cp -r openocd-bundle/openocd/scripts datavis-rs-macos-aarch64/openocd/scripts
          cp -r openocd-bundle/libexec datavis-rs-macos-aarch64/openocd/libexec
          chmod +x datavis-rs-macos-aarch64/datavis-rs datavis-rs-macos-aarch64/openocd/bin/openocd
          tar czf datavis-rs-macos-aarch64.tar.gz datavis-rs-macos-aarch64

      - name: Upload portable archive
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64-portable
          path: datavis-rs-macos-aarch64.tar.gz

  build-macos-x86_64:
    name: Build (macOS x86_64)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build
        run: cargo build --release --target x86_64-apple-darwin

      - name: Download OpenOCD
        run: |
          curl -sL "https://github.com/xpack-dev-tools/openocd-xpack/releases/download/v${OPENOCD_VERSION}/xpack-openocd-${OPENOCD_VERSION}-darwin-x64.tar.gz" | tar xz
          mv "xpack-openocd-${OPENOCD_VERSION}" openocd-bundle

      - name: Package
        run: cargo packager --release --formats dmg --target x86_64-apple-darwin

      - name: Bundle OpenOCD into DMG
        run: |
          # Find the .app — cargo-packager outputs to target/<triple>/release/bundle/macos/
          APP_PATH=$(find target -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find .app bundle"
            exit 1
          fi
          # Inject OpenOCD into the .app bundle
          mkdir -p "$APP_PATH/Contents/Resources/openocd/bin"
          cp openocd-bundle/bin/openocd "$APP_PATH/Contents/Resources/openocd/bin/"
          cp -r openocd-bundle/openocd/scripts "$APP_PATH/Contents/Resources/openocd/scripts"
          cp -r openocd-bundle/libexec "$APP_PATH/Contents/Resources/openocd/libexec"
          chmod +x "$APP_PATH/Contents/Resources/openocd/bin/openocd"
          # Re-create DMG with bundled OpenOCD
          hdiutil create -volname "Data Visualizer" -srcfolder "$APP_PATH" -ov -format UDZO "Data Visualizer_x86_64.dmg"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-dmg
          path: "Data Visualizer_x86_64.dmg"

      - name: Create portable archive with OpenOCD
        run: |
          mkdir -p datavis-rs-macos-x86_64/openocd/bin
          cp target/x86_64-apple-darwin/release/datavis-rs datavis-rs-macos-x86_64/
          cp openocd-bundle/bin/openocd datavis-rs-macos-x86_64/openocd/bin/
          cp -r openocd-bundle/openocd/scripts datavis-rs-macos-x86_64/openocd/scripts
          cp -r openocd-bundle/libexec datavis-rs-macos-x86_64/openocd/libexec
          chmod +x datavis-rs-macos-x86_64/datavis-rs datavis-rs-macos-x86_64/openocd/bin/openocd
          tar czf datavis-rs-macos-x86_64.tar.gz datavis-rs-macos-x86_64

      - name: Upload portable archive
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-portable
          path: datavis-rs-macos-x86_64.tar.gz

  build-windows:
    name: Build (Windows x86_64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Convert version for MSI
        shell: pwsh
        run: |
          # Get version from tag or workflow input
          $version = "${{ inputs.version || github.ref_name }}"

          # Remove 'v' prefix
          $version = $version -replace '^v', ''

          # Convert semantic version to MSI-compatible 3-part version (X.Y.Z)
          # Since Cargo requires 3-part semver and MSI needs numeric-only,
          # we use the prerelease number to increment the patch version:
          # Examples:
          #   0.1.0-alpha.1 -> 0.1.1
          #   0.1.0-beta.3  -> 0.1.3
          #   0.1.0-rc.5    -> 0.1.5
          #   0.1.0         -> 0.1.0
          if ($version -match '^(\d+)\.(\d+)\.(\d+)(?:-(alpha|beta|rc)\.(\d+))?$') {
              $major = $matches[1]
              $minor = $matches[2]
              $patch = $matches[3]
              $prerelease_num = if ($matches[5]) { $matches[5] } else { "0" }

              # If there's a prerelease, use its number; otherwise keep original patch
              if ($prerelease_num -ne "0") {
                  $msi_version = "$major.$minor.$prerelease_num"
              } else {
                  $msi_version = "$major.$minor.$patch"
              }
          } else {
              Write-Error "Version format not recognized: $version"
              exit 1
          }

          Write-Host "Original version: $version"
          Write-Host "MSI version: $msi_version"

          # Update Cargo.toml with MSI-compatible version
          # This replaces both [package] version and [package.metadata.packager] version
          $cargo_toml = Get-Content Cargo.toml -Raw
          $cargo_toml = $cargo_toml -replace 'version = "\d+\.\d+\.\d+(-\w+\.\d+)?"', "version = `"$msi_version`""
          $cargo_toml | Set-Content Cargo.toml

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package
        run: cargo packager --release --formats nsis,wix

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: target/release/*.msi

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: target/release/*-setup.exe

      - name: Download OpenOCD
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/xpack-dev-tools/openocd-xpack/releases/download/v$env:OPENOCD_VERSION/xpack-openocd-$env:OPENOCD_VERSION-win32-x64.zip" -OutFile openocd.zip
          Expand-Archive openocd.zip -DestinationPath .
          Rename-Item "xpack-openocd-$env:OPENOCD_VERSION" openocd-bundle

      - name: Create portable archive with OpenOCD
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "datavis-rs-windows-x86_64/openocd/bin" -Force
          Copy-Item "target/x86_64-pc-windows-msvc/release/datavis-rs.exe" "datavis-rs-windows-x86_64/"
          Copy-Item "openocd-bundle/bin/*" "datavis-rs-windows-x86_64/openocd/bin/"
          Copy-Item -Recurse "openocd-bundle/openocd/scripts" "datavis-rs-windows-x86_64/openocd/scripts"
          Compress-Archive -Path "datavis-rs-windows-x86_64" -DestinationPath "datavis-rs-windows-x86_64.zip"

      - name: Upload portable archive
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: datavis-rs-windows-x86_64.zip

  release:
    name: Create Release
    needs: [build-linux, build-macos-aarch64, build-macos-x86_64, build-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release

          # Linux
          cp artifacts/linux-deb/*.deb release/ || true
          cp artifacts/linux-appimage/*.AppImage release/ || true
          cp artifacts/linux-portable/*.tar.gz release/

          # macOS aarch64
          cp artifacts/macos-aarch64-dmg/*.dmg release/ || true
          cp artifacts/macos-aarch64-portable/*.tar.gz release/

          # macOS x86_64
          cp artifacts/macos-x86_64-dmg/*.dmg release/ || true
          cp artifacts/macos-x86_64-portable/*.tar.gz release/

          # Windows
          cp artifacts/windows-msi/*.msi release/ || true
          cp artifacts/windows-nsis/*-setup.exe release/ || true
          cp artifacts/windows-portable/*.zip release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          name: ${{ inputs.version || github.ref_name }}
          generate_release_notes: true
          files: release/*
